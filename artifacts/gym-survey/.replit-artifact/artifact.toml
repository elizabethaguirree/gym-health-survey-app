kind = "web"
previewPath = "/"
title = "Gym & Health Habits Survey"
version = "1.0.0"
id = "artifacts/gym-survey"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24478

[services.development]
run = "pnpm --filter @workspace/gym-survey run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gym-survey", "run", "build" ]
publicDir = "artifacts/gym-survey/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24478"
BASE_PATH = "/"
